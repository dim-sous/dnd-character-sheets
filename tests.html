<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rules tests</title>
<style>
  body {
    margin: 0; padding: 1.5rem;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4ede0; color: #241d16;
  }
  @media (prefers-color-scheme: dark) { body { background: #1a1613; color: #ece3d6; } }
  h1 { font-size: 1.3rem; margin: 0 0 .3rem; }
  .summary { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; }
  .summary.pass { color: #2f6b46; }
  .summary.fail { color: #a33b2c; }
  ol { padding-left: 1.4rem; margin: 0; }
  li { padding: .18rem 0; font-variant-numeric: tabular-nums; }
  li.fail { color: #a33b2c; font-weight: 600; }
  li.pass::marker, li.fail::marker { color: #8b7d6d; }
  code { background: rgba(128,128,128,.16); padding: 0 .25rem; border-radius: 3px; }
  h2 { font-size: .78rem; text-transform: uppercase; letter-spacing: .1em;
       color: #8b7d6d; margin: 1.3rem 0 .3rem; }
</style>
</head>
<body>

<h1>Rules tests</h1>
<p class="summary" id="summary">Running…</p>
<div id="out"></div>

<script type="module">
/**
 * The browser view of the suite: import the shared assertions from tests.js and paint
 * them. The suite itself is DOM-free so the same file runs under Node in CI — see
 * tests.js and tools/run-tests.mjs.
 */
import { results } from './tests.js';

const out = document.getElementById('out');
const passed = results.filter((r) => r.ok).length;
const failed = results.length - passed;

let currentGroup = null;
let list = null;

for (const r of results) {
  if (r.group !== currentGroup) {
    currentGroup = r.group;
    const h = document.createElement('h2');
    h.textContent = currentGroup;
    out.append(h);
    list = document.createElement('ol');
    out.append(list);
  }
  const li = document.createElement('li');
  li.className = r.ok ? 'pass' : 'fail';
  li.textContent = r.ok
    ? `✓ ${r.label}`
    : `✗ ${r.label} — expected ${JSON.stringify(r.expected)}, got ${JSON.stringify(r.actual)}`;
  list.append(li);
}

const summary = document.getElementById('summary');
summary.className = `summary ${failed === 0 ? 'pass' : 'fail'}`;
summary.textContent = failed === 0
  ? `All ${passed} assertions passed.`
  : `${failed} of ${results.length} assertions FAILED.`;
</script>
</body>
</html>
